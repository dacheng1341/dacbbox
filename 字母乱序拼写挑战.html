<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字母乱序拼写挑战 - 终极防弹满血版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #4a90e2 0%, #50e3c2 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            overflow-x: hidden;
        }

        /* 顶部控制台 (毛玻璃效果) */
        .settings-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            width: 90%;
            max-width: 600px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .controls-row select,
        .controls-row input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            background: #fff;
        }

        .controls-row select:focus,
        .controls-row input:focus {
            border-color: #4a90e2;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-act {
            flex: 1;
            min-width: 110px;
            padding: 12px 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-review {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
        }

        .btn-review:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-new {
            background: linear-gradient(to right, #43e97b 0%, #38f9d7 100%);
            color: #2c3e50;
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(67, 233, 123, 0.4);
        }

        .btn-mistake {
            background: linear-gradient(to right, #ff0844 0%, #ffb199 100%);
        }

        .btn-mistake:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 8, 68, 0.4);
        }

        #loading {
            font-size: 18px;
            color: #fff;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 800px;
            max-width: 90%;
            position: relative;
            min-height: 400px;
            display: none;
            box-sizing: border-box;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h1 {
            color: #4a90e2;
            margin-top: 0;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #555;
            margin-bottom: 20px;
            padding: 0 10px;
            border-bottom: 2px dashed #eee;
            padding-bottom: 15px;
        }

        .lives {
            color: #e74c3c;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(231, 76, 60, 0.2);
        }

        .progress {
            color: #4a90e2;
            background: #f0f4f8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .hint-cn {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 15px 0;
            min-height: 40px;
            word-break: break-word;
            white-space: normal;
            line-height: 1.4;
        }

        .message {
            height: 30px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .helper-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .helper-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            background: #f0f4f8;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #4a90e2;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .helper-btn:hover {
            background: #e1e8ef;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .helper-btn.btn-skip {
            color: #e74c3c;
            background: #fff0f0;
        }

        .helper-btn.btn-skip:hover {
            background: #ffe4e4;
        }

        /* 拼写插槽 */
        .slots-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 25px 0;
            min-height: 60px;
            box-sizing: border-box;
            width: 100%;
        }

        .slot {
            width: 50px;
            height: 60px;
            border-bottom: 4px solid #4a90e2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            box-sizing: border-box;
            flex-shrink: 1;
            min-width: 25px;
        }

        .slot.filled {
            border-bottom-color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 8px 8px 0 0;
        }

        .slot.error-anim {
            border-bottom-color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            animation: shakeMatch 0.4s;
        }

        /* 乱序字母键盘 */
        .letters-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 30px;
            box-sizing: border-box;
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 16px;
            border: 1px solid #eee;
        }

        .letter-btn {
            width: 50px;
            height: 50px;
            background: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 800;
            color: #4a90e2;
            cursor: pointer;
            box-shadow: 0 4px 0 #d1d8e0, 0 5px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        .letter-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d1d8e0;
            background: #f0f4f8;
        }

        .letter-btn.used {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
        }

        /* 手机端样式适配 */
        @media screen and (max-width: 600px) {
            .settings-bar {
                padding: 12px 10px;
                width: 95%;
                gap: 10px;
            }

            .btn-act {
                min-width: 30%;
                font-size: 13px;
                padding: 10px 4px;
            }

            .controls-row select {
                width: 140px;
            }

            .container {
                padding: 25px 15px;
                width: 95%;
                overflow: hidden;
                border-radius: 16px;
            }

            .slot {
                width: 30px;
                height: 40px;
                font-size: 20px;
                gap: 4px;
                border-bottom-width: 3px;
                margin-bottom: 5px;
            }

            .slots-container {
                gap: 4px;
            }

            .letter-btn {
                width: 38px;
                height: 44px;
                font-size: 18px;
                border-radius: 8px;
                box-shadow: 0 3px 0 #d1d8e0;
            }

            .letter-btn:active {
                transform: translateY(3px);
                box-shadow: 0 0 0 #d1d8e0;
            }

            .letters-container {
                gap: 6px;
                padding: 10px;
            }

            .hint-cn {
                font-size: 20px;
                margin: 10px 0;
            }
        }

        /* ==========================================
           2. Anki 弹窗样式
           ========================================== */
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #modal-overlay.active {
            display: flex;
        }

        .anki-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-sizing: border-box;
            animation: modalFadeIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .error-badge {
            text-align: center;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 8px;
            background: linear-gradient(to right, #ff4757, #ff6b81);
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
        }

        .play-audio-btn {
            background: #a78bfa;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(167, 139, 250, 0.4);
        }

        .play-audio-btn:hover {
            background: #8b5cf6;
            transform: scale(1.1) rotate(5deg);
        }

        .play-audio-btn:active {
            transform: scale(0.95);
        }

        #m-card-front {
            text-align: center;
        }

        .front-phonetic {
            font-size: 28px;
            color: #444;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .front-phonetic .ipa {
            font-size: 22px;
            font-family: sans-serif;
            color: #666;
        }

        .type-input {
            width: 100%;
            max-width: 400px;
            font-size: 32px;
            padding: 12px;
            text-align: center;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-weight: bold;
            color: #2c3e50;
        }

        .type-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1);
        }

        .type-input.correct {
            border-color: #2ed573;
            background: #f1fdf5;
            color: #27ae60;
        }

        .type-input.error {
            border-color: #ff4757;
            animation: shakeMatch 0.4s;
            color: #c0392b;
            background: #fff5f5;
        }

        @keyframes shakeMatch {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-8px);
            }

            40%,
            80% {
                transform: translateX(8px);
            }
        }

        .btn-view-answer {
            background: none;
            border: none;
            color: #ff4757;
            font-size: 14px;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 15px;
            padding: 5px;
            transition: color 0.2s;
            font-weight: bold;
        }

        .btn-view-answer:hover {
            color: #d0021b;
        }

        #m-card-back {
            display: none;
        }

        .back-header {
            text-align: center;
            border-bottom: 2px dashed #eee;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .back-word {
            font-size: 52px;
            color: #5B4B8A;
            font-weight: 900;
            margin: 0;
            line-height: 1.2;
            text-transform: lowercase;
        }

        .m-word-img-container {
            text-align: center;
            margin-bottom: 25px;
            display: none;
        }

        .info-block {
            margin-bottom: 25px;
            text-align: left;
        }

        .info-label {
            color: #999;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }

        .info-content {
            font-size: 17px;
            line-height: 1.7;
            color: #2c3e50;
            word-break: break-word;
            white-space: normal;
        }

        .memory-box {
            background: #fff9db;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #fcc419;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        #m-en-meaning-block {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #a78bfa;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .anki-footer {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            border-top: 2px dashed #eee;
            padding-top: 20px;
        }

        .eval-btn {
            flex: 1;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 12px 5px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .eval-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            border-color: #ddd;
        }

        .eval-key {
            font-size: 10px;
            color: #888;
            margin-bottom: 5px;
            border: 1px solid #ccc;
            padding: 2px 8px;
            border-radius: 6px;
            background: #fafafa;
        }

        .eval-text {
            font-weight: 900;
            font-size: 14px;
        }

        .eval-good .eval-text {
            color: #2ed573;
        }

        @media screen and (max-width: 600px) {
            .anki-card {
                padding: 25px 20px !important;
                width: 95% !important;
                border-radius: 16px;
            }

            .back-word {
                font-size: 38px !important;
            }

            .front-phonetic {
                font-size: 20px !important;
            }

            .type-input {
                font-size: 24px !important;
            }
        }
    </style>
</head>

<body>

    <div class="settings-bar">
        <div class="controls-row">
            📚 <select id="setting-cat">
                <option value="">加载词库...</option>
            </select>
            🔢 <input type="number" id="setting-limit" value="10" min="2" max="50" style="width: 50px;"> 词
        </div>
        <div class="btn-group" id="main-btn-group">
            <button class="btn-act btn-review" onclick="startSession('review')">🔄 智能复习</button>
            <button class="btn-act btn-new" onclick="startSession('new')">🆕 学习新词</button>
            <button class="btn-act btn-mistake" onclick="startSession('mistake')">🔥 错题攻坚</button>
        </div>
    </div>

    <div id="loading" style="display:none;"></div>

    <div class="container" id="game-container">
        <h1>🧩 字母乱序拼写挑战</h1>
        <div class="status-bar">
            <span class="progress" id="progress-el">进度: 0/0</span>
            <span class="lives" id="lives-el">❤️❤️❤️❤️❤️</span>
        </div>

        <div class="hint-cn" id="hint-el">准备好了吗？</div>

        <div class="helper-bar">
            <button class="helper-btn" onclick="playWordAudio()">🔊 听发音</button>
            <button class="helper-btn btn-skip" onclick="skipToAnswer()">💡 记不住看答案</button>
        </div>

        <div class="message" id="msg-el"></div>

        <div class="slots-container" id="slots-container"></div>
        <div class="letters-container" id="letters-container"></div>
    </div>

    <div id="modal-overlay">
        <div class="anki-card">
            <div class="error-badge" id="m-badge">💥 生命耗尽，强制开启错题复习</div>

            <div id="m-card-front">
                <div style="color:#888; font-size:14px; margin-bottom:15px;">听音拼写正确的单词</div>
                <div class="front-phonetic">
                    <span id="m-front-phonetic">[/phonetic/]</span>
                    <button class="play-audio-btn" onclick="playModalWordAudio()">🔊</button>
                </div>
                <input type="text" id="m-type-word" class="type-input" placeholder="输入单词..." autocomplete="off">
                <p style="color:#bbb; font-size:12px; margin-top:10px; margin-bottom: 5px;">拼写正确后自动显示解析</p>
                <button class="btn-view-answer" id="btn-show-answer">想不起来？直接查看答案 💡</button>
            </div>

            <div id="m-card-back">
                <div class="back-header">
                    <h2 class="back-word" id="m-word">Word</h2>
                    <div class="front-phonetic" style="margin-top:10px; margin-bottom:0;">
                        <span id="m-back-phonetic">[/phonetic/]</span>
                        <button class="play-audio-btn" onclick="playModalWordAudio()">🔊</button>
                    </div>
                </div>

                <div class="m-word-img-container" id="m-word-img-container"></div>

                <div class="info-block" id="m-en-meaning-block">
                    <span class="info-label" style="color:#a78bfa;">英文释义 Definition</span>
                    <div class="info-content" id="m-en-meaning" style="font-style:italic;"></div>
                </div>

                <div class="info-block" id="m-meaning-block"><span class="info-label">中文释义</span>
                    <div class="info-content" id="m-meaning"></div>
                </div>
                <div class="info-block memory-box" id="m-memory-block"><span class="info-label"
                        style="color:#d4ac0d;">记忆助手</span>
                    <div class="info-content" id="m-memory"></div>
                </div>
                <div class="info-block" id="m-example-block"><span class="info-label">例句解析</span>
                    <div class="info-content" style="font-family: Georgia, serif;" id="m-example"></div>
                </div>

                <div
                    style="text-align:center; color:#bbb; font-size:12px; margin-top:20px; border-top: 1px dashed #eee; padding-top: 15px;">
                    已记入错题本！按空格键继续：</div>

                <div class="anki-footer">
                    <button class="eval-btn eval-good" onclick="submitAnki(null)"><span
                            class="eval-key">Space</span><span class="eval-text">继续游戏</span></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="game-audio" src="" preload="auto"></audio>
    <audio id="m-audio" src="" preload="auto"></audio>
    <audio id="m-en-audio" src="" preload="auto"></audio>
    <audio id="m-ex-audio" src="" preload="auto"></audio>

    <script>
        // 🛡️ 纯净沙盒隔离：绝对杜绝 && 和 ||
        (function () {
            var wordList = [];
            var currentIndex = 0;
            var currentWordObj = null;
            var lives = 5;
            var isGameOver = false;
            var currentSpell = [];
            var expectedLength = 0;

            var gameContainer = document.getElementById('game-container');
            var loading = document.getElementById('loading');
            var hintEl = document.getElementById('hint-el');
            var msgEl = document.getElementById('msg-el');
            var livesEl = document.getElementById('lives-el');
            var progressEl = document.getElementById('progress-el');
            var slotsContainer = document.getElementById('slots-container');
            var lettersContainer = document.getElementById('letters-container');

            var gameAudio = document.getElementById('game-audio');
            var mAudio = document.getElementById('m-audio');
            var mEnAudio = document.getElementById('m-en-audio');
            var mExAudio = document.getElementById('m-ex-audio');

            var modal = document.getElementById('modal-overlay');
            var mCardFront = document.getElementById('m-card-front');
            var mCardBack = document.getElementById('m-card-back');
            var mTypeWord = document.getElementById('m-type-word');

            var catSelect = document.getElementById('setting-cat');
            var limitInput = document.getElementById('setting-limit');

            // 🟢 全局音频防重叠机制
            function stopAllAudio() {
                if (gameAudio) { gameAudio.pause(); gameAudio.currentTime = 0; }
                if (mAudio) { mAudio.pause(); mAudio.currentTime = 0; }
                if (mEnAudio) { mEnAudio.pause(); mEnAudio.currentTime = 0; }
                if (mExAudio) { mExAudio.pause(); mExAudio.currentTime = 0; }
            }

            // 🟢 智能 AI 语音兜底函数
            function fallbackToAIVoice(text) {
                var hasSpeech = false;
                if ('speechSynthesis' in window) { hasSpeech = true; }
                if (hasSpeech) {
                    var utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            }

            window.playWordAudio = function () {
                if (currentWordObj) {
                    stopAllAudio();
                    var hasAudio = false;
                    if (currentWordObj.audio) {
                        if (currentWordObj.audio !== '') { hasAudio = true; }
                    }
                    if (hasAudio) {
                        gameAudio.src = currentWordObj.audio;
                        gameAudio.currentTime = 0;
                        gameAudio.onerror = function () { fallbackToAIVoice(currentWordObj.word); };
                        gameAudio.play().catch(function (e) { fallbackToAIVoice(currentWordObj.word); });
                    } else {
                        fallbackToAIVoice(currentWordObj.word);
                    }
                }
            }

            window.playModalWordAudio = function () {
                if (currentWordObj) {
                    stopAllAudio();
                    var hasAudio = false;
                    if (currentWordObj.audio) {
                        if (currentWordObj.audio !== '') { hasAudio = true; }
                    }
                    if (hasAudio) {
                        mAudio.currentTime = 0;
                        mAudio.onerror = function () { fallbackToAIVoice(currentWordObj.word); };
                        mAudio.play().catch(function (e) { fallbackToAIVoice(currentWordObj.word); });
                    } else {
                        fallbackToAIVoice(currentWordObj.word);
                    }
                }
            }

            window.playModalEnAudio = function () {
                if (currentWordObj) {
                    stopAllAudio();
                    var hasAudio = false;
                    if (currentWordObj.en_audio) {
                        if (currentWordObj.en_audio !== '') { hasAudio = true; }
                    }
                    if (hasAudio) {
                        mEnAudio.currentTime = 0;
                        mEnAudio.onerror = function () { fallbackToAIVoice(currentWordObj.word); };
                        mEnAudio.play().catch(function (e) { fallbackToAIVoice(currentWordObj.word); });
                    } else {
                        fallbackToAIVoice(currentWordObj.word);
                    }
                }
            }

            window.playModalExAudio = function () {
                if (currentWordObj) {
                    stopAllAudio();
                    var hasAudio = false;
                    if (currentWordObj.example_audio) {
                        if (currentWordObj.example_audio !== '') { hasAudio = true; }
                    }
                    if (hasAudio) {
                        mExAudio.currentTime = 0;
                        mExAudio.onerror = function () { fallbackToAIVoice(currentWordObj.word); };
                        mExAudio.play().catch(function (e) { fallbackToAIVoice(currentWordObj.word); });
                    } else {
                        fallbackToAIVoice(currentWordObj.word);
                    }
                }
            }

            function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

            function safeGet(url) {
                return fetch(url, {
                    credentials: 'same-origin',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
            }

            function safeFetch(url, formData) {
                return fetch(url, {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
            }

            function safeParseJSON(text) {
                try {
                    var match = text.match(/\{[\s\S]*\}/);
                    if (match) { return JSON.parse(match[0]); }
                    return JSON.parse(text);
                } catch (e) { return null; }
            }

            function initApp() { fetchCategories(); }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                setTimeout(initApp, 100);
            }

            function fetchCategories() {
                safeGet('/wp-admin/admin-ajax.php?action=get_word_categories_v5')
                    .then(function (res) { return res.text(); })
                    .then(function (text) {
                        var json = safeParseJSON(text);
                        if (json) {
                            if (json.success) {
                                if (catSelect) {
                                    var optHtml = '<option value="">全部词库</option>';
                                    for (var i = 0; i < json.data.length; i++) {
                                        var cat = json.data[i];
                                        optHtml += '<option value="' + cat.slug + '">' + cat.name + '</option>';
                                    }
                                    catSelect.innerHTML = optHtml;
                                    var savedCat = localStorage.getItem('anki_guess_cat') || '';
                                    if (savedCat) { catSelect.value = savedCat; }
                                }
                                if (limitInput) {
                                    var savedLimit = localStorage.getItem('anki_guess_limit') || 10;
                                    if (savedLimit) { limitInput.value = savedLimit; }
                                }
                            }
                        }
                    })
                    .catch(function (e) { });
            }

            if (catSelect) {
                catSelect.addEventListener('change', function () { localStorage.setItem('anki_guess_cat', this.value); });
            }
            if (limitInput) {
                limitInput.addEventListener('change', function () { localStorage.setItem('anki_guess_limit', this.value); });
            }

            window.startSession = function (mode) {
                gameContainer.style.display = 'none';
                document.getElementById('main-btn-group').style.display = 'none';
                loading.style.display = 'block';

                var loadingMsg = "正在检索单词...";
                if (mode === 'review') { loadingMsg = "正在检索到期需复习的单词..."; }
                if (mode === 'mistake') { loadingMsg = "正在提取历史错题..."; }
                loading.innerText = loadingMsg;

                if (limitInput) { localStorage.setItem('anki_guess_limit', limitInput.value); }
                if (catSelect) { localStorage.setItem('anki_guess_cat', catSelect.value); }

                var formData = new FormData();
                var reqAction = 'get_daily_words_v5';
                if (mode === 'mistake') { reqAction = 'get_mistake_words_v5'; }

                formData.append('action', reqAction);

                var limitVal = 10;
                if (limitInput) {
                    if (limitInput.value) { limitVal = limitInput.value; }
                }
                formData.append('limit', limitVal);

                if (catSelect) {
                    if (catSelect.value) { formData.append('category', catSelect.value); }
                }

                if (mode !== 'mistake') { formData.append('task_type', mode); }

                safeFetch('/wp-admin/admin-ajax.php', formData)
                    .then(function (res) { return res.text(); })
                    .then(function (text) {
                        var json = safeParseJSON(text);

                        var needsLogin = false;
                        if (text === '0') { needsLogin = true; }
                        if (text === 0) { needsLogin = true; }
                        if (json) {
                            if (json.success === false) {
                                if (json.data === '请登录') { needsLogin = true; }
                            }
                        }

                        if (needsLogin) {
                            loading.innerHTML = '<span style="font-size:18px; display:block; margin-bottom:15px; color:#e74c3c;">⚠️ 必须登录后才能开启学习挑战！</span><button onclick="window.location.href=\'/wp-login.php\'" style="padding:10px 25px; border-radius:8px; border:none; background:linear-gradient(135deg, #e74c3c, #c0392b); color:#fff; font-weight:bold; cursor:pointer; font-size:16px; box-shadow: 0 4px 10px rgba(231,76,60,0.3);">立即登录</button>';
                            return;
                        }

                        var isValidData = false;
                        if (json) {
                            if (json.success) {
                                if (json.data) {
                                    if (json.data.length > 0) { isValidData = true; }
                                }
                            }
                        }

                        if (isValidData) {
                            wordList = json.data;
                            loading.style.display = 'none';
                            document.getElementById('main-btn-group').style.display = 'flex';
                            gameContainer.style.display = 'block';
                            startGame();
                        } else {
                            var msg = "🍵 休息一下吧！该分类下暂无此类任务。";
                            if (mode === 'mistake') { msg = "✅ 完美！目前没有错题待复习！"; }
                            loading.innerText = msg;
                            setTimeout(function () {
                                loading.style.display = 'none';
                                document.getElementById('main-btn-group').style.display = 'flex';
                            }, 3000);
                        }
                    })
                    .catch(function (e) {
                        loading.innerText = "网络请求被拦截，请尝试刷新页面。";
                        setTimeout(function () {
                            loading.style.display = 'none';
                            document.getElementById('main-btn-group').style.display = 'flex';
                        }, 3000);
                    });
            }

            // 🟢 强制补充 is_correct 记录错题
            function reportProgress(wordId, rating) {
                var formData = new FormData();
                formData.append('action', 'save_word_progress_v5');
                formData.append('word_id', wordId);
                formData.append('rating', rating);

                var isCor = 0;
                if (rating > 1) { isCor = 1; }
                formData.append('is_correct', isCor);

                safeFetch('/wp-admin/admin-ajax.php', formData).catch(function (e) { });
            }

            function startGame() { currentIndex = 0; nextLevel(); }

            function nextLevel() {
                if (currentIndex >= wordList.length) {
                    var endHtml = '<h1 style="font-size:36px; color:#2ecc71; margin-top:80px;">🎉 挑战完成！</h1>';
                    endHtml += '<p style="font-size:20px; color:#666;">数据已全部同步至记忆大脑。</p>';
                    endHtml += '<button class="btn-act btn-review" style="margin-top:20px;" onclick="location.reload()">再来一局</button>';
                    gameContainer.innerHTML = endHtml;
                    return;
                }

                isGameOver = false;
                msgEl.innerText = "";
                guessedLetters = [];
                currentSpell = [];
                lives = 5;
                updateLives();

                currentWordObj = wordList[currentIndex];
                progressEl.innerText = '进度: ' + (currentIndex + 1) + ' / ' + wordList.length;

                // 自动发音带 AI 兜底
                if (currentWordObj) {
                    setTimeout(function () { window.playWordAudio(); }, 100);
                }

                var pureCn = "未知释义";
                if (currentWordObj) {
                    if (currentWordObj.meaning) {
                        var safeWord = currentWordObj.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        var c1 = currentWordObj.meaning.replace(/<[^>]+>/g, ' ');
                        var c2 = c1.replace(/\[.*?\]|\/.*?\//g, '');
                        var c3 = c2.replace(new RegExp(safeWord, 'gi'), '');
                        var c4 = c3.replace(/[\r\n]+/g, ', ').replace(/\s+/g, ' ');
                        var finalCn = c4.replace(/,(\s*,)+/g, ',').replace(/^[, ]+|[, ]+$/g, '');
                        if (finalCn) { pureCn = finalCn; }
                    }
                }
                hintEl.innerText = pureCn;

                setupGameBoard();
            }

            window.skipToAnswer = function () {
                if (isGameOver) return;
                isGameOver = true;
                msgEl.innerText = "直接看答案！已记入错题。";
                msgEl.style.color = "#e74c3c";

                var validWord = currentWordObj.word.toUpperCase().replace(/[^A-Z]/g, '');
                var slots = document.querySelectorAll('.slot');
                for (var i = 0; i < slots.length; i++) {
                    slots[i].innerText = validWord[i];
                    slots[i].classList.add('filled');
                }
                var btns = document.querySelectorAll('.letter-btn');
                for (var j = 0; j < btns.length; j++) {
                    btns[j].classList.add('used');
                }

                reportProgress(currentWordObj.id, 1);
                setTimeout(function () {
                    showPunishmentModal(currentWordObj, "💡 你选择了直接看答案，进入错题复习");
                }, 800);
            }

            function setupGameBoard() {
                var validWord = currentWordObj.word.toUpperCase().replace(/[^A-Z]/g, '');
                expectedLength = validWord.length;

                slotsContainer.innerHTML = '';
                for (var i = 0; i < expectedLength; i++) {
                    var slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.id = 'slot-' + i;
                    (function (idx) {
                        slot.onclick = function () { removeLetterFromSlot(idx); };
                    })(i);
                    slotsContainer.appendChild(slot);
                }

                var lettersArr = validWord.split('');
                lettersArr.sort(function () { return Math.random() - 0.5; });

                lettersContainer.innerHTML = '';
                for (var k = 0; k < lettersArr.length; k++) {
                    var char = lettersArr[k];
                    var btn = document.createElement('div');
                    btn.className = 'letter-btn';
                    btn.innerText = char;
                    btn.id = 'lbtn-' + k;
                    (function (c, index) {
                        btn.onclick = function () { addLetterToSlot(c, index); };
                    })(char, k);
                    lettersContainer.appendChild(btn);
                }
            }

            function updateLives() {
                var str = "";
                for (var i = 0; i < lives; i++) { str += "❤️"; }
                livesEl.innerText = str;
            }

            function addLetterToSlot(char, btnIndex) {
                if (isGameOver) return;
                if (currentSpell.length >= expectedLength) return;

                var slotIndex = currentSpell.length;
                currentSpell.push({ char: char, originId: btnIndex });

                document.getElementById('lbtn-' + btnIndex).classList.add('used');
                var slot = document.getElementById('slot-' + slotIndex);
                slot.innerText = char;
                slot.classList.add('filled');

                if (currentSpell.length === expectedLength) {
                    setTimeout(checkAnswer, 200);
                }
            }

            function removeLetterFromSlot(slotIndex) {
                if (isGameOver) return;
                if (slotIndex >= currentSpell.length) return;

                var removedItem = currentSpell[slotIndex];
                document.getElementById('lbtn-' + removedItem.originId).classList.remove('used');

                currentSpell.splice(slotIndex, 1);
                refreshSlots();
            }

            function refreshSlots() {
                var slots = document.querySelectorAll('.slot');
                for (var i = 0; i < slots.length; i++) {
                    var slot = slots[i];
                    if (i < currentSpell.length) {
                        slot.innerText = currentSpell[i].char;
                        slot.classList.add('filled');
                    } else {
                        slot.innerText = '';
                        slot.classList.remove('filled', 'error-anim');
                    }
                }
            }

            function checkAnswer() {
                var spelledWord = "";
                for (var i = 0; i < currentSpell.length; i++) {
                    spelledWord += currentSpell[i].char;
                }
                var correctWord = currentWordObj.word.toUpperCase().replace(/[^A-Z]/g, '');

                if (spelledWord === correctWord) {
                    isGameOver = true;
                    msgEl.innerText = "🎉 完美拼写！";
                    msgEl.style.color = "#2ecc71";
                    reportProgress(currentWordObj.id, 3);
                    setTimeout(function () {
                        currentIndex++;
                        nextLevel();
                    }, 1000);
                } else {
                    lives--;
                    updateLives();

                    var slots = document.querySelectorAll('.slot');
                    for (var j = 0; j < slots.length; j++) {
                        slots[j].classList.add('error-anim');
                    }

                    setTimeout(function () {
                        for (var k = 0; k < currentSpell.length; k++) {
                            var item = currentSpell[k];
                            document.getElementById('lbtn-' + item.originId).classList.remove('used');
                        }
                        currentSpell = [];
                        refreshSlots();

                        if (lives <= 0) {
                            isGameOver = true;
                            msgEl.innerText = "😵 生命耗尽！";
                            msgEl.style.color = "#e74c3c";
                            reportProgress(currentWordObj.id, 1);
                            setTimeout(function () {
                                showPunishmentModal(currentWordObj, "💥 生命耗尽，强制开启错题复习");
                            }, 800);
                        }
                    }, 500);
                }
            }

            document.addEventListener('keydown', function (event) {
                if (modal.classList.contains('active')) return;
                var key = event.key.toUpperCase();

                var isLetter = false;
                if (key >= 'A') {
                    if (key <= 'Z') {
                        if (key.length === 1) {
                            isLetter = true;
                        }
                    }
                }

                if (isLetter) {
                    var btns = document.querySelectorAll('.letter-btn:not(.used)');
                    for (var i = 0; i < btns.length; i++) {
                        if (btns[i].innerText === key) {
                            btns[i].click();
                            break;
                        }
                    }
                }
                if (event.code === 'Backspace') {
                    if (currentSpell.length > 0) {
                        removeLetterFromSlot(currentSpell.length - 1);
                    }
                }
            });

            function showPunishmentModal(wordData, customBadgeMsg) {
                if (customBadgeMsg) {
                    document.getElementById('m-badge').innerText = customBadgeMsg;
                }

                var phoneticStr = '[无音标]';
                if (wordData.phonetic) { phoneticStr = wordData.phonetic; }

                // 🟢 用 innerHTML 渲染 HTML 音标
                document.getElementById('m-front-phonetic').innerHTML = phoneticStr;
                document.getElementById('m-back-phonetic').innerHTML = phoneticStr;
                document.getElementById('m-word').innerText = wordData.word;

                if (wordData.meaning) {
                    document.getElementById('m-meaning').innerHTML = wordData.meaning;
                } else {
                    document.getElementById('m-meaning').innerHTML = '暂无释义';
                }

                // 🟢 高清双图渲染
                var imgContainer = document.getElementById('m-word-img-container');
                var imgHtml = '';
                if (wordData.img1) {
                    if (wordData.img1 !== '') {
                        imgHtml += '<img decoding="async" src="' + wordData.img1 + '" style="width:100%; display:block; margin:0 auto 15px auto; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">';
                    }
                }
                if (wordData.img2) {
                    if (wordData.img2 !== '') {
                        imgHtml += '<img decoding="async" src="' + wordData.img2 + '" style="width:100%; display:block; margin:0 auto 15px auto; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">';
                    }
                }

                if (imgHtml !== '') {
                    imgContainer.innerHTML = imgHtml;
                    imgContainer.style.display = 'block';
                } else {
                    imgContainer.style.display = 'none';
                }

                if (wordData.en_meaning) {
                    if (wordData.en_meaning.trim() !== '') {
                        var enHtml = wordData.en_meaning;
                        if (wordData.en_audio) {
                            if (wordData.en_audio !== '') {
                                mEnAudio.src = wordData.en_audio;
                                var speakerBtn = ' <span style="cursor:pointer; font-size:18px; vertical-align:middle; margin-left:8px;" onclick="playModalEnAudio()">🔊</span>';
                                enHtml += speakerBtn;
                            }
                        }
                        document.getElementById('m-en-meaning').innerHTML = enHtml;
                        document.getElementById('m-en-meaning-block').style.display = 'block';
                    } else {
                        document.getElementById('m-en-meaning-block').style.display = 'none';
                    }
                } else {
                    document.getElementById('m-en-meaning-block').style.display = 'none';
                }

                if (wordData.memory) {
                    if (wordData.memory.trim() !== '') {
                        document.getElementById('m-memory').innerHTML = wordData.memory;
                        document.getElementById('m-memory-block').style.display = 'block';
                    } else {
                        document.getElementById('m-memory-block').style.display = 'none';
                    }
                } else {
                    document.getElementById('m-memory-block').style.display = 'none';
                }

                if (wordData.example) {
                    if (wordData.example.trim() !== '') {
                        var exHtml = wordData.example;
                        if (wordData.example_audio) {
                            if (wordData.example_audio !== '') {
                                mExAudio.src = wordData.example_audio;
                                var speakerBtnEx = ' <span style="cursor:pointer; font-size:18px; vertical-align:middle; margin-left:8px;" onclick="playModalExAudio()">🔊</span>';
                                exHtml += speakerBtnEx;
                            }
                        }
                        document.getElementById('m-example').innerHTML = exHtml;
                        document.getElementById('m-example-block').style.display = 'block';
                    } else {
                        document.getElementById('m-example-block').style.display = 'none';
                    }
                } else {
                    document.getElementById('m-example-block').style.display = 'none';
                }

                // 🟢 弹窗自动发音 (带AI兜底)
                setTimeout(function () {
                    var hasModalAudio = false;
                    if (wordData.audio) {
                        if (wordData.audio !== '') { hasModalAudio = true; }
                    }
                    if (hasModalAudio) {
                        mAudio.src = wordData.audio;
                        stopAllAudio();
                        mAudio.onerror = function () { fallbackToAIVoice(wordData.word); };
                        mAudio.play().catch(function (e) { fallbackToAIVoice(wordData.word); });
                    } else {
                        stopAllAudio();
                        fallbackToAIVoice(wordData.word);
                    }
                }, 100);

                mCardFront.style.display = 'block';
                mCardBack.style.display = 'none';
                mTypeWord.value = '';
                mTypeWord.classList.remove('correct', 'error');
                modal.classList.add('active');
                setTimeout(function () { mTypeWord.focus(); }, 300);
            }

            document.getElementById('btn-show-answer').addEventListener('click', function () {
                document.getElementById('m-card-front').style.display = 'none';
                document.getElementById('m-card-back').style.display = 'block';
                playModalWordAudio();
            });

            mTypeWord.addEventListener('input', function () {
                if (!currentWordObj) return;
                if (this.value.trim().toLowerCase() === currentWordObj.word.toLowerCase()) {
                    this.classList.add('correct');
                    setTimeout(function () {
                        document.getElementById('m-card-front').style.display = 'none';
                        document.getElementById('m-card-back').style.display = 'block';
                        playModalWordAudio();
                    }, 400);
                }
            });

            mTypeWord.addEventListener('keypress', function (e) {
                if (!currentWordObj) return;
                if (e.key === 'Enter') {
                    if (this.value.trim().toLowerCase() !== currentWordObj.word.toLowerCase()) {
                        this.classList.add('error');
                        var self = this;
                        setTimeout(function () { self.classList.remove('error'); }, 400);
                    }
                }
            });

            document.addEventListener('keydown', function (e) {
                if (modal.classList.contains('active')) {
                    if (document.getElementById('m-card-back').style.display === 'block') {
                        var code = e.code;
                        // 🟢 保留唯一的空格键过关，杜绝覆盖错题
                        if (code === 'Space') { submitAnki(null); }
                    }
                }
            });

            window.submitAnki = function (rating) {
                if (rating !== null) { reportProgress(currentWordObj.id, rating); }
                modal.classList.remove('active');
                stopAllAudio();
                currentIndex++;
                nextLevel();
            }

        })();
    </script>
